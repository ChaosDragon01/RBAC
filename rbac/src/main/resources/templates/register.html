<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-container">
        <h1>Join Us</h1>
        <h2>Create your account</h2>

        <div th:if="${param.error}" class="error-msg" style="display:block;">
            Username already exists.
        </div>

        <form th:action="@{/register}" method="post" novalidate id="registerForm">
            
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
                <div class="error-tooltip">Please choose a username</div>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
                <div class="error-tooltip">Email is required for recovery</div>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()" title="Show/Hide Password">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <div class="error-tooltip">Password cannot be empty</div>
            </div>

            <button type="submit" class="btn">Sign Up</button>
        </form>

        <p style="margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
            Already have an account? <br>
            <a href="/login" style="color: var(--text-primary); font-weight: 600; text-decoration: none;">Log in here</a>
        </p>
    </div>

    <script>
        // 1. Password Visibility Toggle
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        }

        // 2. Custom Validation Logic
        const form = document.getElementById('registerForm');
        
        form.addEventListener('submit', function (event) {
            let isValid = true;
            const inputs = form.querySelectorAll('input[required]');

            inputs.forEach(input => {
                const tooltip = input.closest('.input-group').querySelector('.error-tooltip');
                
                if (!input.value.trim()) {
                    event.preventDefault(); // Stop submission
                    input.classList.add('input-error');
                    tooltip.classList.add('visible');
                    isValid = false;
                } else {
                    input.classList.remove('input-error');
                    tooltip.classList.remove('visible');
                }

                input.addEventListener('input', () => {
                    input.classList.remove('input-error');
                    tooltip.classList.remove('visible');
                });
            });
        });
    </script>
</body>
</html>
