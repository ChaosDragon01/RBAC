<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-container">
        <h1>Welcome Back</h1>
        <h2>Sign in to continue</h2>

        <div th:if="${param.error}" class="error-msg" style="display:block;">
            Invalid username or password.
        </div>
        
        <div th:if="${param.logout}" class="badge" style="color: #4caf50; border-color: #4caf50;">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post" novalidate id="loginForm">
            
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Username" required>
                <div class="error-tooltip">Username is required</div>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="••••••" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()" title="Show/Hide Password">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <div class="error-tooltip">Password is required</div>
            </div>
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:1.5rem;">
                <input type="checkbox" name="remember-me" id="remember" style="width:auto;">
                <label for="remember" style="margin:0; cursor:pointer;">Keep me signed in</label>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>

        <p style="margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
            New here? <br>
            <a href="/register" style="color: var(--text-primary); font-weight: 600; text-decoration: none;">Create an account</a>
        </p>
    </div>

    <script>
        // 1. Password Visibility Toggle
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        }

        // 2. Custom Validation Logic (Replaces Browser Popup)
        const form = document.getElementById('loginForm');
        
        form.addEventListener('submit', function (event) {
            let isValid = true;
            const inputs = form.querySelectorAll('input[required]');

            inputs.forEach(input => {
                const tooltip = input.closest('.input-group').querySelector('.error-tooltip');
                
                if (!input.value.trim()) {
                    event.preventDefault(); // Stop submission
                    input.classList.add('input-error');
                    tooltip.classList.add('visible');
                    isValid = false;
                } else {
                    input.classList.remove('input-error');
                    tooltip.classList.remove('visible');
                }

                // Remove error styling as soon as user types
                input.addEventListener('input', () => {
                    input.classList.remove('input-error');
                    tooltip.classList.remove('visible');
                });
            });
        });
    </script>
</body>
</html>
